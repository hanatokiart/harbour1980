<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>玩家端 - 港灣 1980 (V2)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --win: #22c55e; --trophy: #f59e0b; --home: #ec4899; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 10px; margin: 0; padding-bottom: 50px; }
        .section { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .p-btn { background: #334155; color: white; padding: 8px; font-size: 0.65rem; border: 1px solid #475569; border-radius: 6px; line-height: 1.4; }
        #deal-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .hand-box { margin-top:10px; padding:10px; background:#0f172a; border-radius:8px; border: 1px dashed var(--accent); }
        .tag { font-size: 0.65rem; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }
        .tag-elec { background: #1d4ed8; }
        .tag-life { background: #059669; }
        .tag-luxury { background: #b45309; }
    </style>
</head>
<body>
    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <div>
                <b id="role-display" style="font-size: 1.1rem;">-</b><br>
                <small id="skill-text" style="color:var(--accent)"></small>
            </div>
            <b id="cash-display" style="color:var(--win); font-size:1.4rem">$0</b>
        </div>
    </div>

    <div id="deal-modal">
        <h2 style="color:var(--accent)">💰 收到交易出價！</h2>
        <div id="offer-info" style="margin:20px; font-size:1.2rem; text-align:center"></div>
        <button class="btn" style="background:var(--win); color:white" onclick="replyOffer(true)">✅ 接受成交</button>
        <button class="btn" style="background:#ef4444; color:white; margin-top:15px" onclick="replyOffer(false)">❌ 拒絕</button>
    </div>

    <div class="section" style="border-left: 5px solid var(--win)">
        <h5 style="margin:0">🎒 倉庫 (上限 3 件)</h5>
        <div id="my-inv"></div>
    </div>

    <div class="section" style="border-left: 5px solid var(--home)">
        <h5 style="margin:0; color:var(--home)">🏠 我的家居 (收藏品)</h5>
        <div id="my-home" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px;"></div>
    </div>

    <div class="section" style="border-left: 5px solid var(--trophy)">
        <div style="display:flex; justify-content:space-between">
            <h5 style="margin:0; color:var(--trophy)">📈 本輪累積佣金</h5>
            <b id="my-comm" style="color:var(--trophy)">$0</b>
        </div>
    </div>

    <div class="section">
        <h5 style="margin:0 0 8px">📦 80 年代市場 (入貨)</h5>
        <div id="mkt-list" class="grid"></div>
    </div>

    <div class="section" style="border: 2px solid #e0af68">
        <h5 style="margin:0; color:#e0af68">🤝 點對點交易 (出貨)</h5>
        <select id="target-p" onchange="updateTargetInv()" style="width:100%; padding:10px; margin-top:5px; background:#0f172a; color:white"><option value="">1. 揀賣家</option><option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option></select>
        <select id="target-item" style="width:100%; padding:10px; margin-top:5px; background:#0f172a; color:white"><option value="">2. 揀產品</option></select>
        <input type="number" id="offer-price" placeholder="3. 出價 $" style="width:100%; padding:10px; margin-top:5px; background:#0f172a; color:white; box-sizing:border-box">
        <button class="btn" style="background:#e0af68" onclick="sendOffer()">📤 送出交易請求</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI", authDomain: "harbour1980-bac14.firebaseapp.com", databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com", projectId: "harbour1980-bac14", appId: "1:1010384901946:web:302f99b7565aa9063aa203" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pId = new URLSearchParams(window.location.search).get('id') || 'P1';

        const PRODS = [
            { id:"i1", n:"摩圖羅拉 3380", type:"電子", p:8000, c:3000, s:15000 },
            { id:"i2", n:"老利時 水鬼", type:"奢侈", p:12000, c:4500, s:22000 },
            { id:"i3", n:"新力 走路人", type:"電子", p:1500, c:600, s:2800 },
            { id:"i4", n:"金星 電視機", type:"生活", p:3000, c:1200, s:5500 },
            { id:"i5", n:"任天堂 紅白機", type:"生活", p:800, c:400, s:1600 },
            { id:"i6", n:"駱駝牌 暖水壺", type:"生活", p:300, c:150, s:650 }
        ];

        let gs = {};

        onValue(ref(db, 'game_state'), (snap) => {
            gs = snap.val(); if(!gs) return;
            const me = gs.players[pId];

            document.getElementById('role-display').innerText = `${pId} - ${me.role.n}`;
            document.getElementById('skill-text').innerText = me.role.s;
            document.getElementById('cash-display').innerText = `$${me.cash}`;
            document.getElementById('my-comm').innerText = `$${me.currentComm || 0}`;

            // 倉庫更新
            const invArea = document.getElementById('my-inv'); invArea.innerHTML = "";
            if(me.inv && me.inv.length > 0) {
                me.inv.forEach(i => {
                    invArea.innerHTML += `
                        <div style="padding:8px; border-bottom:1px solid #334155; display:flex; justify-content:space-between;">
                            <span><span class="tag ${i.type==='電子'?'tag-elec':(i.type==='生活'?'tag-life':'tag-luxury')}">${i.type}</span>${i.n}</span>
                            <div style="text-align:right">
                                <small style="color:var(--accent)">基礎佣金: $${i.c}</small><br>
                                <b style="color:var(--win)">建議零售: $${i.s}</b>
                            </div>
                        </div>`;
                });
            } else {
                invArea.innerHTML = "<div style='padding:10px; text-align:center;'><small style='color:#ef4444'>⚠️ 倉庫空空！連續 3 輪將會被炒魷 (底薪 $0)</small></div>";
            }

            // 家居收藏更新
            const homeArea = document.getElementById('my-home'); homeArea.innerHTML = "";
            if(me.home) {
                me.home.forEach(i => {
                    homeArea.innerHTML += `<div style="background:#475569; padding:4px 8px; border-radius:4px; font-size:0.7rem;">🖼️ ${i.n}</div>`;
                });
            }

            // 市場更新
            const mkt = document.getElementById('mkt-list'); mkt.innerHTML = "";
            PRODS.forEach(p => {
                const buyer = gs.inventory && gs.inventory[p.id];
                let b = document.createElement('button'); b.className = "p-btn";
                if (buyer) {
                    b.innerHTML = `${p.n}<br><span style="color:#ef4444">已被 ${buyer} 購入</span>`;
                    b.disabled = true; b.style.opacity = "0.5";
                } else {
                    b.innerHTML = `${p.n}<br>入貨:$${p.p}<br><span style="color:var(--win)">零售:$${p.s}</span>`;
                    b.disabled = (me.inv && me.inv.length >= 3);
                    b.onclick = () => window.buyItem(p);
                }
                mkt.appendChild(b);
            });

            // 交易彈窗
            const act = gs.last_action;
            if(act && act.type === "OFFER" && act.seller === pId) {
                document.getElementById('offer-info').innerHTML = `<b>${act.user}</b> 想用 <b style="color:var(--win)">$${act.price}</b><br>買你的 <b>${act.prodName}</b>`;
                document.getElementById('deal-modal').style.display = "flex";
            } else { document.getElementById('deal-modal').style.display = "none"; }
        });

        window.buyItem = (p) => {
            const me = gs.players[pId];
            let cost = (me.role.n === "格價大叔") ? p.p - 500 : p.p;
            if(me.cash < cost) return alert("資金不足！");
            const up = {};
            up[`game_state/inventory/${p.id}`] = pId;
            up[`game_state/players/${pId}/inv`] = [...(me.inv || []), p];
            up[`game_state/players/${pId}/cash`] = me.cash - cost;
            update(ref(db), up);
        };

        window.updateTargetInv = () => {
            const tId = document.getElementById('target-p').value;
            const sel = document.getElementById('target-item'); sel.innerHTML = '<option value="">2. 揀產品</option>';
            if(tId && gs.players[tId].inv) gs.players[tId].inv.forEach(i => sel.innerHTML += `<option value="${i.id}">${i.n}</option>`);
        };

        window.sendOffer = () => {
            const seller = document.getElementById('target-p').value;
            const pid = document.getElementById('target-item').value;
            const price = document.getElementById('offer-price').value;
            if(!seller || !pid || !price) return alert("請填寫出價資訊！");
            update(ref(db, 'game_state/last_action'), { 
                user: pId, seller: seller, prodId: pid, 
                prodName: document.getElementById('target-item').selectedOptions[0].text, 
                price: price, type: "OFFER" 
            });
        };

        window.replyOffer = (ok) => {
            const act = gs.last_action;
            if(ok) {
                const me = gs.players[pId];
                const item = me.inv.find(i => i.id === act.prodId);
                
                // 計算佣金加成
                let comm = item.c;
                if(me.role.n === "港產女王" && item.type === "電子") comm += 1000;
                if(me.role.n === "生活先鋒" && item.type === "生活") comm += 1000;

                const totalGet = parseInt(act.price) + comm;
                const up = {};
                // 買家扣錢
                up[`game_state/players/${act.user}/cash`] = gs.players[act.user].cash - parseInt(act.price);
                // 賣家加錢 (成交價 + 佣金)
                up[`game_state/players/${pId}/cash`] = me.cash + totalGet;
                // 累積佣金
                up[`game_state/players/${pId}/totalComm`] = (me.totalComm || 0) + comm;
                up[`game_state/players/${pId}/currentComm`] = (me.currentComm || 0) + comm;
                // 移除貨物
                up[`game_state/players/${pId}/inv`] = me.inv.filter(i => i.id !== act.prodId);
                
                up[`game_state/last_action`] = { user: pId, type: "DONE", value: `🤝 成交！${act.prodName} 以 $${act.price} 賣出，賺取佣金 $${comm}` };
                update(ref(db), up);
            } else {
                update(ref(db, 'game_state/last_action'), { type: "IDLE", user: pId, value: `❌ ${pId} 拒絕了出價` });
            }
        };
    </script>
</body>
</html>
