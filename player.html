<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>玩家端 - 港灣 1980</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --win: #22c55e; --trophy: #a855f7; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 10px; margin: 0; }
        .section { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .p-btn { background: #334155; color: white; padding: 8px; font-size: 0.65rem; border: 1px solid #475569; border-radius: 6px; line-height: 1.4; }
        #deal-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .hand-box { margin-top:10px; padding:10px; background:#0f172a; border-radius:8px; border: 1px dashed var(--accent); }
    </style>
</head>
<body>
    <div class="section">
        <div style="display:flex; justify-content:space-between">
            <b id="role-display">-</b>
            <b id="cash-display" style="color:var(--win); font-size:1.2rem">$0</b>
        </div>
        <small id="skill-text" style="color:#94a3b8"></small>
    </div>

    <div id="deal-modal">
        <h2 style="color:var(--accent)">💰 收到交易出價！</h2>
        <div id="offer-info" style="margin:20px; font-size:1.2rem; color:white"></div>
        <button class="btn" style="background:var(--win); color:white" onclick="replyOffer(true)">✅ 接受成交</button>
        <button class="btn" style="background:#ef4444; color:white; margin-top:15px" onclick="replyOffer(false)">❌ 拒絕</button>
    </div>

    <div class="section" style="border-left: 5px solid var(--win)">
        <h5 style="margin:0">🎒 我的倉庫 (已扣除按金)</h5>
        <div id="my-inv"></div>
    </div>

    <div class="section" style="border-left: 5px solid var(--trophy)">
        <h5 style="margin:0; color:var(--trophy)">🏆 我的戰利品 (成交佣金)</h5>
        <div id="my-trophies" style="font-size:0.9rem; margin-top:5px; font-weight:bold; color:#d8b4fe">本輪累積佣金: $0</div>
    </div>

    <div class="section">
        <h5 style="margin:0 0 8px">📦 市場入貨 (上限 3 件)</h5>
        <div id="mkt-list" class="grid"></div>
    </div>

    <div class="section" style="border: 2px solid #e0af68">
        <h5 style="margin:0; color:#e0af68">🤝 點對點交易</h5>
        <select id="target-p" onchange="updateTargetInv()" style="width:100%; padding:10px; margin-top:5px; background:#0f172a; color:white"><option value="">1. 揀賣家</option><option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option></select>
        <select id="target-item" style="width:100%; padding:10px; margin-top:5px; background:#0f172a; color:white"><option value="">2. 揀產品</option></select>
        <input type="number" id="offer-price" placeholder="3. 出價 $" style="width:100%; padding:10px; margin-top:5px; background:#0f172a; color:white; box-sizing:border-box">
        <button class="btn" style="background:#e0af68" onclick="sendOffer()">📤 送出交易請求</button>
    </div>

    <div class="section" style="border: 2px solid #38bdf8;">
        <h5 style="margin:0; color:#38bdf8;">🃏 事件卡系統</h5>
        <div class="hand-box">
            <small style="color:#94a3b8">我的手牌 (待使用)：</small>
            <div id="my-hand" style="font-weight:bold; font-size:1.1rem; margin:5px 0;">無</div>
            <button class="btn" id="use-card-btn" onclick="useCard()" style="background:#f59e0b; color:#020617; font-size:0.8rem; padding:5px;">⚡ 立即使用卡片</button>
        </div>
        <hr style="border:0; border-top:1px solid #334155; margin:10px 0;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" id="draw-btn" onclick="drawCard()" style="width:60%; background:#22c55e; color:#020617;">📦 抽事件卡</button>
            <div style="text-align:right">
                <small style="color:#94a3b8">生效中：</small><br>
                <span id="event-active" style="color:#38bdf8; font-weight:bold;">無</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI", authDomain: "harbour1980-bac14.firebaseapp.com", databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com", projectId: "harbour1980-bac14", appId: "1:1010384901946:web:302f99b7565aa9063aa203" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pId = new URLSearchParams(window.location.search).get('id') || 'P1';

        const PRODS = [
            { id:"i1", n:"波士機(金)", p:5000, c:2000, s:8500 }, { id:"i2", n:"全能王(銀)", p:3000, c:1200, s:5500 }, 
            { id:"i3", n:"神機(銅)", p:1000, c:400, s:2000 }, { id:"i4", n:"文書機(普)", p:500, c:200, s:1000 },
            { id:"i5", n:"隔世大師(金)", p:5000, c:2000, s:9000 }, { id:"i6", n:"潮流環(銀)", p:3000, c:1200, s:5200 }, 
            { id:"i7", n:"健康神(銅)", p:1000, c:400, s:2200 }, { id:"i8", n:"復古錶(普)", p:500, c:200, s:900 },
            { id:"i9", n:"無敵衫(金)", p:5000, c:2000, s:8800 }, { id:"i10", n:"速乾神(銀)", p:3000, c:1200, s:4800 }, 
            { id:"i11", n:"養生杯(銅)", p:1000, c:400, s:1800 }, { id:"i12", n:"棉花神(普)", p:500, c:200, s:800 }
        ];

        const EVENTS_DATA = {
            "政府派錢": "本輪買家預算加 $2,000，成交機率大增。",
            "廣告加持": "『手機類』產品本輪佣金雙倍。",
            "稅務減免": "本輪結算時，『不購買稅』降至 $0。",
            "壞貨退回": "結算時，未賣出的貨可退回 100% 按金。",
            "強制購買": "推銷後，買家必買，不可拒絕。",
            "奧客降臨": "買家可瘋狂壓價，本輪不可拒絕交易。",
            "黑市交易": "成交佣金外加 $1,000。",
            "連鎖效應": "下一位向同一買家推銷的人，佣金加 $500。",
            "物流延誤": "本輪所有市場入貨成本額外增加 $300。",
            "名牌效應": "推銷「金級」產品時，時間額外加 30 秒。"
        };

        let gs = {};

        onValue(ref(db, 'game_state'), (snap) => {
            gs = snap.val(); if(!gs) return;
            const me = gs.players[pId];

            // 1. 基本資訊
            document.getElementById('role-display').innerText = `${pId} - ${me.role.n}`;
            document.getElementById('skill-text').innerText = me.role.s;
            document.getElementById('cash-display').innerText = `$${me.cash}`;

            // 2. 倉庫更新
            const invArea = document.getElementById('my-inv'); invArea.innerHTML = "";
            if(me.inv && me.inv.length > 0) {
                me.inv.forEach(i => invArea.innerHTML += `<div style="padding:5px; border-bottom:1px solid #334155">${i.n} (佣金 $${i.c})</div>`);
            } else { invArea.innerHTML = "<small style='color:red'>倉庫空！結算將扣 $500 不購買稅</small>"; }

            // 3. 戰利品 (本輪佣金)
            document.getElementById('my-trophies').innerText = `本輪已賺佣金: $${me.totalComm || 0}`;

            // 4. 市場更新 (含建議售價與防重購買)
            const mkt = document.getElementById('mkt-list'); mkt.innerHTML = "";
            PRODS.forEach(p => {
                const buyer = gs.inventory && gs.inventory[p.id];
                let b = document.createElement('button'); b.className = "p-btn";
                if (buyer) {
                    b.innerHTML = `${p.n}<br><span style="color:#ef4444">已被 ${buyer} 購入</span>`;
                    b.disabled = true; b.style.opacity = "0.5";
                } else {
                    b.innerHTML = `${p.n}<br>入貨:$${p.p}<br><span style="color:var(--win)">零售:$${p.s}</span>`;
                    b.disabled = (me.inv && me.inv.length >= 3);
                    b.onclick = () => window.buyItem(p);
                }
                mkt.appendChild(b);
            });

            // 5. 事件卡 UI
            document.getElementById('my-hand').innerText = me.hand || "無";
            document.getElementById('event-active').innerText = me.lastEvent || "無";
            const remaining = 2 - (me.drawCount || 0);
            document.getElementById('draw-btn').innerText = `📦 抽卡 (${remaining})`;
            document.getElementById('draw-btn').disabled = (remaining <= 0);
            document.getElementById('use-card-btn').disabled = (!me.hand || me.hand === "無");

            // 6. 交易彈窗
            const act = gs.last_action;
            if(act && act.type === "OFFER" && act.seller === pId) {
                document.getElementById('offer-info').innerText = `${act.user} 想用 $${act.price} 買你的 ${act.prodName}`;
                document.getElementById('deal-modal').style.display = "flex";
            } else { document.getElementById('deal-modal').style.display = "none"; }
        });

        // 全域函數掛載
        window.buyItem = (p) => {
            const me = gs.players[pId];
            let cost = (me.role.n === "格價大叔") ? p.p - 500 : p.p;
            if(me.cash < cost) return alert("錢唔夠");
            const up = {};
            up[`game_state/inventory/${p.id}`] = pId;
            up[`game_state/players/${pId}/inv`] = [...(me.inv || []), p];
            up[`game_state/players/${pId}/cash`] = me.cash - cost;
            update(ref(db), up);
        };

        window.drawCard = async () => {
            const me = gs.players[pId];
            if ((me.drawCount || 0) >= 2) return alert("每輪限抽 2 張！");
            if (!gs.event_deck || gs.event_deck.length === 0) return alert("牌堆已空！");

            const currentDeck = [...gs.event_deck];
            const card = currentDeck.shift();
            const updates = {};
            updates[`game_state/event_deck`] = currentDeck;
            updates[`game_state/players/${pId}/hand`] = card.n;
            updates[`game_state/players/${pId}/drawCount`] = (me.drawCount || 0) + 1;
            updates[`game_state/last_action`] = { user: pId, type: "DRAW", value: `${pId} 抽到事件卡，待發動` };
            await update(ref(db), updates);
            alert(`抽到：【${card.n}】\n作用：${EVENTS_DATA[card.n]}\n已放入手牌。`);
        };

        window.useCard = async () => {
            const me = gs.players[pId];
            const cardName = me.hand;
            if (!cardName || cardName === "無") return alert("手上有冇卡！");
            const desc = EVENTS_DATA[cardName];

            if (!confirm(`確定發動【${cardName}】？\n作用：${desc}`)) return;

            const updates = {};
            updates[`game_state/players/${pId}/hand`] = "無";
            updates[`game_state/players/${pId}/lastEvent`] = cardName;
            updates[`game_state/last_action`] = {
                user: pId, type: "SKILL", value: `🔥 發動：${cardName}`, detail: desc
            };
            await update(ref(db), updates);
        };

        window.updateTargetInv = () => {
            const tId = document.getElementById('target-p').value;
            const sel = document.getElementById('target-item'); sel.innerHTML = '<option value="">2. 揀產品</option>';
            if(tId && gs.players[tId].inv) gs.players[tId].inv.forEach(i => sel.innerHTML += `<option value="${i.id}">${i.n}</option>`);
        };

        window.sendOffer = () => {
            const seller = document.getElementById('target-p').value;
            const pid = document.getElementById('target-item').value;
            const price = document.getElementById('offer-price').value;
            if(!seller || !pid || !price) return alert("未填完！");
            update(ref(db, 'game_state/last_action'), { user: pId, seller: seller, prodId: pid, prodName: document.getElementById('target-item').selectedOptions[0].text, price: price, type: "OFFER" });
        };

        window.replyOffer = (ok) => {
            const act = gs.last_action;
            if(ok) {
                const seller = gs.players[pId];
                const item = seller.inv.find(i => i.id === act.prodId);
                let comm = item.c; 
                if(seller.role.n === "港產女王" && item.n.includes("金")) comm += 2000;
                const up = {};
                up[`game_state/players/${act.user}/cash`] = gs.players[act.user].cash - parseInt(act.price);
                up[`game_state/players/${pId}/totalComm`] = (seller.totalComm || 0) + comm;
                up[`game_state/players/${pId}/inv`] = seller.inv.filter(i => i.id !== act.prodId);
                up[`game_state/last_action`] = { type: "DONE", user: pId, value: `🤝 成交！獲取佣金 $${comm}` };
                update(ref(db), up);
            } else {
                update(ref(db, 'game_state/last_action'), { type: "IDLE", user: pId, value: `❌ 拒絕出價` });
            }
        };
    </script>
</body>
</html>
