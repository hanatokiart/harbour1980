<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - 玩家控制器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #1a1b26; --card: #24283b; --text: #c0caf5; --accent: #bb9af7; --green: #9ece6a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .section { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid #414868; }
        h3 { margin: 0 0 8px 0; color: var(--accent); font-size: 0.85em; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-box { background: #16161e; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #414868; }
        .stat-box span { display: block; font-size: 0.65em; color: #565f89; }
        .prod-btn { background: #313244; border: 1px solid #565f89; color: #fff; padding: 10px; border-radius: 8px; font-size: 0.8em; text-align: left; }
        .prod-btn:disabled { opacity: 0.2; }
        .badge { background: #f7768e; font-size: 0.65em; padding: 2px 5px; border-radius: 4px; float: right; }
        .btn { background: #7aa2f7; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>

    <h2 id="pId" style="text-align:center; color: var(--accent); margin: 5px 0;">連線中...</h2>

    <div class="stat-grid">
        <div class="stat-box"><span>身分</span><div id="role">-</div></div>
        <div class="stat-box"><span>剩餘現金</span><div id="cash" style="color:var(--green)">$0</div></div>
    </div>

    <div class="section">
        <h3>📦 我的推銷清單 (2-3件) <span id="count-tag" class="badge">0/3</span></h3>
        <div id="my-list" style="font-size:0.85em; color:var(--green)">尚未入貨</div>
    </div>

    <div class="section">
        <h3>🛒 市場入貨 (產品分類)</h3>
        <div id="market" style="display: grid; grid-template-columns: 1fr; gap: 8px;"></div>
    </div>

    <button id="draw-btn" class="btn" style="background:#9ece6a; color:#1a1b26" onclick="drawCard()">🃏 抽事件卡 (限2張)</button>
    <button id="sell-btn" class="btn" style="background:#f7768e" onclick="sendAction('SELL', '開始 90s 推銷！')">📢 開始推銷倒數</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI",
            authDomain: "harbour1980-bac14.firebaseapp.com",
            databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com",
            projectId: "harbour1980-bac14",
            appId: "1:1010384901946:web:302f99b7565aa9063aa203"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pId = new URLSearchParams(window.location.search).get('id') || 'P1';
        document.getElementById('pId').innerText = `玩家 ${pId}`;

        const PRODS = [
            { id: "i1", n: "高階手機 (波士機)", p: 5000, c: 2000, type: "手機類" },
            { id: "i2", n: "全能平板 (全能王)", p: 3000, c: 1200, type: "平板類" },
            { id: "i3", n: "入門手機 (神機)", p: 1000, c: 400, type: "手機類" },
            { id: "i4", n: "藍牙耳機 (隔世大師)", p: 5000, c: 2000, type: "配件類" },
            { id: "i5", n: "智能手環 (潮流環)", p: 3000, c: 1200, type: "佩戴類" },
            { id: "i6", n: "健康手錶 (健康神)", p: 1000, c: 400, type: "佩戴類" },
            { id: "i7", n: "智能家電 (無敵衫)", p: 5000, c: 2000, type: "家居類" },
            { id: "i8", n: "快速充電 (速乾神)", p: 3000, c: 1200, type: "配件類" },
            { id: "i9", n: "隨身杯 (養生杯)", p: 1000, c: 400, type: "生活類" }
        ];

        onValue(ref(db, 'game_state'), (snapshot) => {
            const data = snapshot.val(); if (!data) return;
            const me = data.players[pId];
            document.getElementById('role').innerText = me.role;
            document.getElementById('cash').innerText = `$${me.cash}`;
            
            const invCount = me.inv ? me.inv.length : 0;
            document.getElementById('count-tag').innerText = `${invCount}/3`;
            document.getElementById('my-list').innerText = me.inv ? me.inv.map(i => i.n).join(' | ') : '尚未入貨';
            
            // 抽卡按鈕狀態
            const drawBtn = document.getElementById('draw-btn');
            drawBtn.innerText = `🃏 抽事件卡 (剩餘 ${2 - (me.drawCount || 0)})`;
            drawBtn.disabled = (me.drawCount >= 2);

            // 推銷按鈕狀態：必須入貨最少 2 件
            document.getElementById('sell-btn').disabled = (invCount < 2);

            const mkt = document.getElementById('market');
            mkt.innerHTML = "";
            PRODS.forEach(item => {
                const taker = data.inventory && data.inventory[item.id];
                let btn = document.createElement('button');
                btn.className = 'prod-btn';
                // 鎖定邏輯：有人入咗，或者自己入滿 3 件，就唔俾撳
                btn.disabled = (!!taker || invCount >= 3);
                btn.innerHTML = `<span style="color:var(--accent)">[${item.type}]</span> <b>${item.n}</b><br>
                    <small>批發: $${item.p} | 佣金: $${item.c}</small> ${taker ? `(已被 ${taker} 入)` : ''}`;
                if(!btn.disabled) btn.onclick = () => draft(item);
                mkt.appendChild(btn);
            });
        });

        window.draft = async function(item) {
            const pSnap = await get(ref(db, `game_state/players/${pId}`));
            let pData = pSnap.val();
            if(pData.cash < item.p) return alert("錢唔夠入呢件貨！");
            
            const updates = {};
            updates[`game_state/inventory/${item.id}`] = pId;
            let inv = pData.inv || []; inv.push(item);
            updates[`game_state/players/${pId}/inv`] = inv;
            updates[`game_state/players/${pId}/cash`] = pData.cash - item.p;
            updates[`game_state/last_action`] = { user: pId, type: "DRAFT", value: `入貨：${item.n}` };
            update(ref(db), updates);
        };

        window.drawCard = async function() {
            const pSnap = await get(ref(db, `game_state/players/${pId}`));
            let pData = pSnap.val();
            let count = pData.drawCount || 0;
            if(count >= 2) return alert("呢季你抽完 2 張喇！");

            const dSnap = await get(ref(db, `game_state/event_deck`));
            let deck = dSnap.val() || [];
            const card = deck.shift();
            
            const updates = {};
            updates[`game_state/event_deck`] = deck;
            updates[`game_state/players/${pId}/drawCount`] = count + 1;
            updates[`game_state/last_action`] = { user: pId, type: "DRAW", value: `抽到卡片：${card}` };
            update(ref(db), updates);
            alert("你抽到咗：" + card);
        };

        window.sendAction = (t, v) => update(ref(db, 'game_state/last_action'), { user: pId, type: t, value: v });
    </script>
</body>
</html>
