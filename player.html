<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - 玩家/交易端</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #1a1b26; --card: #24283b; --text: #c0caf5; --accent: #bb9af7; --green: #9ece6a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .section { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid #414868; }
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        input { background: #16161e; border: 1px solid #414868; color: white; padding: 10px; border-radius: 5px; width: 100%; }
        .btn-buy { background: #e0af68; color: #1a1b26; font-weight: bold; border: none; padding: 10px; border-radius: 5px; white-space: nowrap; }
    </style>
</head>
<body>

    <h2 id="pId" style="text-align:center; color: var(--accent);">玩家載入中...</h2>

    <div class="section">
        <h3>🛒 市場入貨 (2-3件)</h3>
        <div id="market" style="display: grid; gap: 8px;"></div>
    </div>

    <div class="section" style="border-color: #e0af68;">
        <h3 style="color: #e0af68;">🤝 講價成交 (買入他人產品)</h3>
        <p style="font-size: 0.7em; opacity: 0.8;">當有人推銷完，你可以在此出價買入。</p>
        <select id="seller-select" style="width:100%; padding:8px; background:#16161e; color:white; border-radius:5px;">
            <option value="">選擇賣家 (邊個 Sell 完?)</option>
            <option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option>
        </select>
        <div class="input-group">
            <input type="number" id="buy-price" placeholder="買入價 $">
            <input type="number" id="buy-comm" placeholder="佢賺嘅佣金 $">
        </div>
        <button class="btn-buy" style="width:100%; margin-top:10px;" onclick="makeOffer()">📤 送出出價 (議價)</button>
    </div>

    <button class="btn-buy" style="background:#f7768e; width:100%; height:50px; margin-top:20px;" onclick="sendAction('SELL', '📢 我推銷緊，邊個買？')">📢 開始推銷！</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* ... 保持不變 ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pId = new URLSearchParams(window.location.search).get('id') || 'P1';
        document.getElementById('pId').innerText = `玩家 ${pId}`;

        window.makeOffer = async function() {
            const seller = document.getElementById('seller-select').value;
            const price = document.getElementById('buy-price').value;
            const comm = document.getElementById('buy-comm').value;
            
            if(!seller || !price || !comm) return alert("請填寫賣家、價格同佣金！");
            if(seller === pId) return alert("唔可以買自己嘢！");

            update(ref(db, 'game_state/last_action'), {
                user: pId,
                type: "OFFER",
                seller: seller,
                price: price,
                comm: comm,
                value: `想用 $${price} 買入！賣家賺 $${comm} 佣金。`
            });
        };

        window.sendAction = (t, v) => update(ref(db, 'game_state/last_action'), { user: pId, type: t, value: v });
        
        // 其他入貨 Logic 保持不變...
    </script>
</body>
</html>
