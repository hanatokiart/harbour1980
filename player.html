<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - 玩家端</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --win: #22c55e; --lose: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: #c0caf5; padding: 10px; margin: 0; }
        .section { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .inv-item { background: #0f172a; padding: 8px; margin-top: 6px; border-radius: 6px; font-size: 0.85rem; border-left: 4px solid var(--win); display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .p-btn { background: #334155; color: white; padding: 8px 4px; border: 1px solid #475569; border-radius: 6px; font-size: 0.65rem; text-align: center; }
        .p-btn:disabled { opacity: 0.3; }
        #deal-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 30px; text-align: center; }
    </style>
</head>
<body>
    <h3 id="pId" style="text-align:center; color:var(--accent); margin:5px">載入中...</h3>

    <div id="deal-modal">
        <h2 style="color:var(--accent)">🤝 收到交易請求！</h2>
        <div id="offer-info" style="font-size:1.3rem; margin:30px 0; color:white; line-height:1.5"></div>
        <button class="btn" style="background:var(--win); color:white; font-size:1.5rem" onclick="replyOffer(true)">✅ 接受成交</button>
        <button class="btn" style="background:var(--lose); color:white; margin-top:20px" onclick="replyOffer(false)">❌ 拒絕出價</button>
    </div>

    <div class="section">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <b>角色：<span id="role-n">-</span></b>
            <b id="cash" style="font-size:1.3rem; color:var(--win)">$0</b>
        </div>
        <div id="role-s" style="font-size:0.75rem; color:#94a3b8; margin-top:5px; line-height:1.3"></div>
        <button class="btn" style="background:var(--accent); color:#020617; font-size:0.75rem; padding:8px" onclick="useSkill()">⚡ 宣告發動技能</button>
    </div>

    <div class="section" style="border-top: 4px solid var(--win)">
        <h5 style="margin:0 0 8px 0">🎒 我的倉庫 (已持有產品)</h5>
        <div id="my-inv"></div>
    </div>

    <div class="section">
        <h5 style="margin:0 0 8px 0">📦 市場入貨 (上限 3 件)</h5>
        <div id="mkt-list" class="grid"></div>
    </div>

    <div class="section" style="border: 2px solid #e0af68">
        <h5 style="margin:0; color:#e0af68">🤝 向其他玩家買貨</h5>
        <select id="target-seller" onchange="updateSellerInv()" style="width:100%; padding:10px; margin-top:8px; background:#0f172a; color:white; border-radius:8px"><option value="">1. 選擇對方賣家</option><option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option></select>
        <select id="prod-select" style="width:100%; padding:10px; margin-top:8px; background:#0f172a; color:white; border-radius:8px"><option value="">2. 選擇他的貨品</option></select>
        <input type="number" id="price" placeholder="3. 輸入成交金額 $" style="width:100%; padding:12px; margin-top:8px; background:#0f172a; color:white; border-radius:8px; border:1px solid #334155; box-sizing:border-box">
        <button class="btn" style="background:#e0af68; color:#020617" onclick="sendOffer()">📤 送出出價請求</button>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px">
        <div class="section" style="margin:0; text-align:center">
            <small>事件：<span id="my-event" style="color:var(--accent)">無</span></small>
            <button class="btn" style="background:var(--win); color:#020617" id="draw-btn" onclick="drawCard()">📦 抽事件卡</button>
        </div>
        <button class="btn" style="background:#f7768e; color:white" onclick="sendAct('SELL', '正在推銷貨品中！')">📢 我要推銷</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI", authDomain: "harbour1980-bac14.firebaseapp.com", databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com", projectId: "harbour1980-bac14", appId: "1:1010384901946:web:302f99b7565aa9063aa203" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pId = new URLSearchParams(window.location.search).get('id') || 'P1';

        const ALL_PRODS = [
            { id:"i1", n:"波士機 (金)", p:5000, c:2000 }, { id:"i2", n:"全能王 (銀)", p:3000, c:1200 }, { id:"i3", n:"神機 (銅)", p:1000, c:400 }, { id:"i4", n:"文書機 (普)", p:500, c:200 },
            { id:"i5", n:"隔世大師 (金)", p:5000, c:2000 }, { id:"i6", n:"潮流環 (銀)", p:3000, c:1200 }, { id:"i7", n:"健康神 (銅)", p:1000, c:400 }, { id:"i8", n:"復古錶 (普)", p:500, c:200 },
            { id:"i9", n:"無敵衫 (金)", p:5000, c:2000 }, { id:"i10", n:"速乾神 (銀)", p:3000, c:1200 }, { id:"i11", n:"養生杯 (銅)", p:1000, c:400 }, { id:"i12", n:"棉花神 (普)", p:500, c:200 }
        ];

        let g = {};
        onValue(ref(db, 'game_state'), (snap) => {
            g = snap.val(); if(!g) return;
            const me = g.players[pId];
            document.getElementById('pId').innerText = `玩家端：${pId}`;
            document.getElementById('role-n').innerText = me.role.n;
            document.getElementById('role-s').innerText = "效果：" + me.role.s;
            document.getElementById('cash').innerText = `$${me.cash}`;
            document.getElementById('my-event').innerText = me.lastEvent || "無";
            document.getElementById('draw-btn').disabled = me.drawCount >= 2;

            // 更新倉庫
            const invDiv = document.getElementById('my-inv'); invDiv.innerHTML = "";
            if(me.inv && me.inv.length > 0) {
                me.inv.forEach(i => { invDiv.innerHTML += `<div class="inv-item"><span>${i.n}</span> <span style="color:var(--accent)">佣金 $${i.c}</span></div>`; });
            } else { invDiv.innerHTML = "<small style='color:#64748b'>目前倉庫沒有產品</small>"; }

            // 賣家成交彈窗
            const act = g.last_action;
            if(act.type === "OFFER" && act.seller === pId) {
                document.getElementById('offer-info').innerHTML = `玩家 <b>${act.user}</b> 想買：<br><b>${act.prodName}</b><br>出價：<b style="color:var(--win); font-size:2rem">$${act.price}</b>`;
                document.getElementById('deal-modal').style.display = "flex";
            } else { document.getElementById('deal-modal').style.display = "none"; }

            // 市場列表
            const mkt = document.getElementById('mkt-list'); mkt.innerHTML = "";
            ALL_PRODS.forEach(p => {
                const isTaken = g.inventory && g.inventory[p.id];
                let btn = document.createElement('button'); btn.className = "p-btn";
                btn.disabled = !!isTaken || (me.inv && me.inv.length >= 3);
                btn.innerHTML = `<b>${p.n}</b><br>$${p.p}`;
                if(!btn.disabled) btn.onclick = () => buyMarket(p);
                mkt.appendChild(btn);
            });
        });

        window.buyMarket = async (p) => {
            const me = g.players[pId];
            let cost = (me.role.n === "格價大叔") ? p.p - 500 : p.p;
            if(me.cash < cost) return alert("現金不足以支付按金！");
            const up = {};
            up[`game_state/inventory/${p.id}`] = pId;
            up[`game_state/players/${pId}/inv`] = [...(me.inv || []), p];
            up[`game_state/players/${pId}/cash`] = me.cash - cost;
            up[`game_state/last_action`] = { type: "BUY", user: pId, value: `購入產品：${p.n}`, detail: `支付按金 $${cost}` };
            update(ref(db), up);
        };

        window.updateSellerInv = () => {
            const target = document.getElementById('target-seller').value;
            const sel = document.getElementById('prod-select'); sel.innerHTML = '<option value="">2. 選擇他的貨品</option>';
            if(target && g.players[target].inv) {
                g.players[target].inv.forEach(i => { sel.innerHTML += `<option value="${i.id}">${i.n}</option>`; });
            }
        };

        window.sendOffer = () => {
            const seller = document.getElementById('target-seller').value;
            const pid = document.getElementById('prod-select').value;
            const price = document.getElementById('price').value;
            if(!seller || !pid || !price) return alert("請填妥交易內容！");
            const pName = document.getElementById('prod-select').selectedOptions[0].text;
            update(ref(db, 'game_state/last_action'), {
                type: "OFFER", user: pId, seller: seller, prodId: pid, prodName: pName, price: price,
                value: `向 ${seller} 發起交易請求`
            });
            alert("已送出請求，請賣家在其手機確認。");
        };

        window.replyOffer = async (ok) => {
            const act = g.last_action;
            if(ok) {
                const buyer = g.players[act.user];
                const seller = g.players[pId];
                const item = seller.inv.find(i => i.id === act.prodId);
                let comm = item.c;
                if(seller.role.n === "港產女王" && item.n.includes("金")) comm += 2000;
                
                const up = {};
                up[`game_state/players/${act.user}/cash`] = buyer.cash - parseInt(act.price);
                up[`game_state/players/${pId}/totalComm`] = seller.totalComm + comm;
                up[`game_state/players/${pId}/inv`] = seller.inv.filter(i => i.id !== act.prodId);
                up[`game_state/last_action`] = { type: "DONE", user: pId, value: `🤝 成交成功！`, detail: `與 ${act.user} 成交 ${item.n}，賺取佣金 $${comm}` };
                update(ref(db), up);
            } else {
                update(ref(db, 'game_state/last_action'), { type: "IDLE", user: pId, value: `❌ 拒絕了 ${act.user} 的交易請求` });
            }
        };

        window.drawCard = () => {
            const card = g.event_deck.shift();
            update(ref(db, `game_state/players/${pId}/lastEvent`), card.n);
            update(ref(db, `game_state/players/${pId}/drawCount`), g.players[pId].drawCount + 1);
            update(ref(db, 'game_state/event_deck'), g.event_deck);
            update(ref(db, 'game_state/last_action'), { type: "DRAW", user: pId, value: `抽到事件：${card.n}`, detail: card.d });
            alert(`【${card.n}】\n${card.d}`);
        };

        window.useSkill = () => update(ref(db, 'game_state/last_action'), { type: "SKILL", user: pId, value: `發動技能：${g.players[pId].role.n}`, detail: g.players[pId].role.s });
        window.sendAct = (t, v) => update(ref(db, 'game_state/last_action'), { type: t, user: pId, value: v });
    </script>
</body>
</html>
