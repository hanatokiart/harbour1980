<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>玩家控制器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --green: #9ece6a; }
        body { font-family: sans-serif; background: var(--bg); color: #c0caf5; padding: 15px; margin: 0; }
        .section { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .grid { display: grid; gap: 8px; }
        .p-btn { background: #334155; color: white; padding: 10px; border-radius: 6px; border: 1px solid #475569; text-align: left; font-size: 0.8rem; }
        input { width: 90%; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <h3 id="pId" style="text-align:center; color:var(--accent)">載入中...</h3>

    <div class="section">
        <div style="display:flex; justify-content:space-between">
            <span id="role-n">角色</span>
            <span id="cash" style="color:var(--green)">$0</span>
        </div>
        <button class="btn" style="background:var(--accent); color:#020617; font-size:0.7em" onclick="useSkill()">⚡ 使用角色技能</button>
    </div>

    <div class="section">
        <h4 style="margin:0 0 10px">🃏 事件卡 (上限 2 張)</h4>
        <button id="draw-btn" class="btn" style="background:var(--green); color:#020617" onclick="drawCard()">📦 抽取事件卡</button>
    </div>

    <div class="section">
        <h4 style="margin:0 0 10px">🛒 入貨 (本季限 2-3 件)</h4>
        <div id="market" class="grid"></div>
    </div>

    <div class="section" style="border: 1px solid #e0af68">
        <h4 style="margin:0; color:#e0af68">🤝 議價成交</h4>
        <select id="seller" style="width:100%; padding:8px; margin-top:5px; background:#0f172a; color:white">
            <option value="">選擇賣家</option><option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option>
        </select>
        <input type="number" id="price" placeholder="成交價 (你付出的現金)">
        <button class="btn" style="background:#e0af68; color:#020617" onclick="sendOffer()">📤 送出交易</button>
    </div>

    <button class="btn" style="background:#f7768e; color:white; padding:18px" onclick="sendAct('SELL', '📢 我推銷緊！')">📢 開始推銷</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI", authDomain: "harbour1980-bac14.firebaseapp.com", databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com", projectId: "harbour1980-bac14", appId: "1:1010384901946:web:302f99b7565aa9063aa203" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const pId = new URLSearchParams(window.location.search).get('id') || 'P1';

        const PRODS = [
            { id: "i1", n: "波士機 (手機)", p: 5000, c: 2000 },
            { id: "i2", n: "全能王 (手機)", p: 3000, c: 1200 },
            { id: "i3", n: "神機 (手機)", p: 1000, c: 400 },
            { id: "i4", n: "隔世大師 (配件)", p: 5000, c: 2000 },
            { id: "i5", n: "潮流環 (佩戴)", p: 3000, c: 1200 },
            { id: "i6", n: "健康神 (佩戴)", p: 1000, c: 400 }
        ];

        onValue(ref(db, 'game_state'), (snap) => {
            const d = snap.val(); if(!d) return;
            const me = d.players[pId];
            document.getElementById('pId').innerText = `玩家 ${pId}`;
            document.getElementById('role-n').innerText = me.role.n;
            document.getElementById('cash').innerText = `$${me.cash}`;
            document.getElementById('draw-btn').disabled = (me.drawCount >= 2);
            document.getElementById('draw-btn').innerText = `📦 抽卡 (剩餘 ${2-me.drawCount})`;

            const mkt = document.getElementById('market'); mkt.innerHTML = "";
            const invCount = me.inv ? me.inv.length : 0;
            PRODS.forEach(p => {
                const taker = d.inventory && d.inventory[p.id];
                let btn = document.createElement('button');
                btn.className = 'p-btn';
                btn.disabled = !!taker || invCount >= 3;
                btn.innerHTML = `<b>${p.n}</b><br><small>按金: $${p.p} | 佣金: $${p.c}</small>${taker?' (已售)':''}`;
                if(!btn.disabled) btn.onclick = () => buy(p);
                mkt.appendChild(btn);
            });
        });

        window.buy = async (item) => {
            const snap = await get(ref(db, `game_state/players/${pId}`));
            let pData = snap.val();
            let cost = (pData.role.n === "格價大叔") ? item.p - 500 : item.p;
            if(pData.cash < cost) return alert("錢唔夠");
            let inv = pData.inv || []; inv.push(item);
            const up = {};
            up[`game_state/inventory/${item.id}`] = pId;
            up[`game_state/players/${pId}/inv`] = inv;
            up[`game_state/players/${pId}/cash`] = pData.cash - cost;
            update(ref(db), up);
        };

        window.drawCard = async () => {
            const snap = await get(ref(db, 'game_state'));
            const d = snap.val();
            if(d.players[pId].drawCount >= 2) return;
            const deck = d.event_deck || [];
            const card = deck.shift();
            const up = {};
            up[`game_state/event_deck`] = deck;
            up[`game_state/players/${pId}/drawCount`] = d.players[pId].drawCount + 1;
            up[`game_state/last_action`] = { user: pId, type: "DRAW", value: `抽到事件卡：${card}` };
            update(ref(db), up);
            alert("抽到：" + card);
        };

        window.useSkill = () => sendAct('SKILL', `發動技能：${document.getElementById('role-n').innerText}！`);

        window.sendOffer = async () => {
            const s = document.getElementById('seller').value;
            const pr = document.getElementById('price').value;
            if(!s || !pr) return alert("填寫完整交易");
            // 自動搵返個產品佣金
            const snap = await get(ref(db, `game_state/players/${s}/inv`));
            const inv = snap.val() || [];
            const comm = inv.length > 0 ? inv[0].c : 0; // 簡化：取第一件貨佣金
            update(ref(db, 'game_state/last_action'), {
                user: pId, seller: s, price: pr, comm: comm, type: "OFFER", value: `出價 $${pr} 買入玩家 ${s} 的產品`
            });
        };

        window.sendAct = (t, v) => update(ref(db, 'game_state/last_action'), { user: pId, type: t, value: v });
    </script>
</body>
</html>
