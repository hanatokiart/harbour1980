<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - 中央管理系統</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --danger: #ef4444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .container { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
        .sidebar { background: #020617; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        .player-card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .player-card h4 { margin: 0 0 5px 0; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .inv-tag { display: inline-block; background: #0ea5e9; font-size: 0.7em; padding: 2px 6px; border-radius: 4px; margin: 2px; color: white; }
        .main-stage { padding: 30px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #notification { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
                        display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        #notification h1 { font-size: 5rem; color: var(--accent); margin: 0; }
        #timer { font-size: 8rem; font-weight: bold; color: white; }
        .btn-reset { position: absolute; bottom: 20px; right: 20px; background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; opacity: 0.5; }
        .btn-reset:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2 style="text-align: center;">📊 實時數據</h2>
            <div id="player-list"></div>
        </div>
        <div class="main-stage">
            <h2 style="font-size: 3rem; opacity: 0.3;">等待玩家行動...</h2>
            <button class="btn-reset" onclick="initGame()">⚠️ 重置遊戲</button>
        </div>
    </div>

    <div id="notification">
        <h2 id="note-user" style="color: white; font-size: 2rem;"></h2>
        <h1 id="note-text"></h1>
        <div id="timer"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI",
            authDomain: "harbour1980-bac14.firebaseapp.com",
            databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com",
            projectId: "harbour1980-bac14",
            appId: "1:1010384901946:web:302f99b7565aa9063aa203"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ROLES = [
            { n: "銷售鬼才", d: "推銷倒數延長 10s" }, { n: "砍價大師", d: "入貨按金減 $500" },
            { n: "運氣王", d: "開局多 1 張事件卡" }, { n: "物流大佬", d: "AP 消耗減 1" }
        ];

        const EVENTS = [
            { n: "政府派錢", d: "預算加 $2,000" }, { n: "廣告加持", d: "佣金 x 2" },
            { n: "稅務減免", d: "不成交罰款 $0" }, { n: "壞貨退回", d: "按金 100% 退回" },
            { n: "強制購買", d: "買家必須成交" }, { n: "奧客降臨", d: "買家強力壓價" },
            { n: "連鎖效應", d: "成交後再抽一張" }, { n: "黑市交易", d: "利潤加倍" },
            { n: "物流延誤", d: "AP 消耗 +1" }, { n: "名牌效應", d: "底價升 $500" }
        ];

        window.initGame = function() {
            if(!confirm("確定要重置所有數據嗎？")) return;
            let sRoles = [...ROLES].sort(() => Math.random() - 0.5);
            let sEvents = [...EVENTS].sort(() => Math.random() - 0.5);
            set(ref(db, 'game_state'), {
                round: 1,
                inventory: {},
                event_deck: sEvents,
                players: {
                    P1: { cash: 10000, role: sRoles[0], inv: [], hand: [] },
                    P2: { cash: 10000, role: sRoles[1], inv: [], hand: [] },
                    P3: { cash: 10000, role: sRoles[2], inv: [], hand: [] },
                    P4: { cash: 10000, role: sRoles[3], inv: [], hand: [] }
                },
                last_action: { type: "IDLE", user: "SYS", value: "遊戲已重置" }
            });
        };

        onValue(ref(db, 'game_state'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const listEl = document.getElementById('player-list');
            listEl.innerHTML = "";
            Object.keys(data.players).forEach(id => {
                const p = data.players[id];
                listEl.innerHTML += `
                    <div class="player-card">
                        <h4>${id} - ${p.role.n}</h4>
                        <div>💰 現金: $${p.cash}</div>
                        <div>📦 庫存: ${p.inv ? p.inv.map(i => `<span class="inv-tag">${i}</span>`).join('') : '無'}</div>
                        <div style="font-size: 0.8em; color: #94a3b8; margin-top:5px;">🃏 事件卡: ${p.hand ? p.hand.length : 0}/2</div>
                    </div>`;
            });

            const act = data.last_action;
            if (act.type !== "IDLE" && act.user !== "SYS") {
                showNotice(act);
            }
        });

        let timerInt;
        function showNotice(act) {
            const el = document.getElementById('notification');
            const txt = document.getElementById('note-text');
            const user = document.getElementById('note-user');
            const timer = document.getElementById('timer');
            
            clearInterval(timerInt);
            user.innerText = `玩家 ${act.user}`;
            txt.innerText = act.value;
            timer.innerText = "";
            el.style.display = "flex";

            if (act.type === "SELL") {
                let count = 90;
                timerInt = setInterval(() => {
                    timer.innerText = count;
                    count--;
                    if(count < 0) {
                        clearInterval(timerInt);
                        el.style.display = "none";
                        update(ref(db, 'game_state/last_action'), { type: "IDLE", user: "SYS" });
                    }
                }, 1000);
            } else {
                setTimeout(() => {
                    el.style.display = "none";
                    update(ref(db, 'game_state/last_action'), { type: "IDLE", user: "SYS" });
                }, 3000);
            }
        }
    </script>
</body>
</html>
