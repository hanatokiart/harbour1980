<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - MC 結算中心 (V2 深度版)</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #38bdf8; --win: #22c55e; --lose: #ef4444; --gold: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
        .sidebar { background: #0f172a; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        .p-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid var(--accent); position: relative; }
        .lp-badge { position: absolute; top: 10px; right: 10px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .main { padding: 30px; display: flex; flex-direction: column; overflow: hidden; }
        #log-screen { flex: 1; background: #000; border-radius: 12px; padding: 15px; border: 1px solid #334155; overflow-y: auto; color: #9ece6a; font-family: monospace; margin-bottom: 20px; font-size: 0.9rem; }
        .summary-box { background: var(--card); padding: 20px; border-radius: 15px; border: 2px solid var(--accent); position: fixed; inset: 50px; z-index: 100; display: none; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
        button { cursor: pointer; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; background: var(--accent); color: #020617; }
        .lazy-tag { background: var(--lose); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent)">📊 1980 龍虎榜</h2>
        <div id="player-display"></div>
        <button onclick="initGame()" style="width:100%; background:var(--lose); color:white; margin-top:10px">🔄 初始化 12 輪挑戰</button>
    </div>
    <div class="main">
        <h2 id="round-info">載入中...</h2>
        <div id="log-screen"><div id="log-content"></div></div>
        <button onclick="showSummary()" style="height:60px; font-size:1.2rem">🏁 回合結算 (計薪/計LP/清季末)</button>
    </div>

    <div id="summary-box" class="summary-box">
        <h2 style="text-align:center; color:var(--win)">💰 財富與生活質素結算</h2>
        <div id="summary-desc" style="text-align:center; margin-bottom:10px; color:#94a3b8"></div>
        <table id="summary-table"></table>
        <div style="margin-top:20px; text-align:center">
            <button id="confirm-btn" onclick="confirmSettlement()" style="background:var(--win); color:white; font-size:1.1rem">✅ 發放薪金並進入下一輪</button>
            <button onclick="document.getElementById('summary-box').style.display='none'" style="background:#475569; color:white; margin-left:10px">取消</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI", authDomain: "harbour1980-bac14.firebaseapp.com", databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com", projectId: "harbour1980-bac14", appId: "1:1010384901946:web:302f99b7565aa9063aa203" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 角色與 FAB 關聯定義
        const ROLES = [
            { n:"港產女王", s:"『電子類』佣金 +$1000", bonusType:"電子" },
            { n:"品質大師", s:"收藏入屋時 LP 額外 +5", bonusType:"收藏" },
            { n:"格價大叔", s:"入貨成本永久 -$500", bonusType:"成本" },
            { n:"生活先鋒", s:"『生活類』佣金 +$1000", bonusType:"生活" }
        ];

        window.initGame = () => {
            if(!confirm("確定要開啟新的 12 輪人生？")) return;
            const shuffledRoles = [...ROLES].sort(() => Math.random() - 0.5);
            set(ref(db, 'game_state'), {
                round: 1, quarter: 1, inventory: {},
                players: {
                    P1: { cash: 10000, role: shuffledRoles[0], totalComm: 0, lp: 0, inv: [], home: [], idleRounds: 0, lastEvent: "無" },
                    P2: { cash: 10000, role: shuffledRoles[1], totalComm: 0, lp: 0, inv: [], home: [], idleRounds: 0, lastEvent: "無" },
                    P3: { cash: 10000, role: shuffledRoles[2], totalComm: 0, lp: 0, inv: [], home: [], idleRounds: 0, lastEvent: "無" },
                    P4: { cash: 10000, role: shuffledRoles[3], totalComm: 0, lp: 0, inv: [], home: [], idleRounds: 0, lastEvent: "無" }
                },
                last_action: { user: "SYS", value: "80年代創業潮開始！" }
            });
        };

        onValue(ref(db, 'game_state'), (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('round-info').innerText = `第 ${d.quarter} 季 - 第 ${d.round} 輪 / 12`;
            
            const list = document.getElementById('player-display'); 
            list.innerHTML = "";
            Object.keys(d.players).forEach(id => {
                const p = d.players[id];
                // 即時計算 LP: (總佣金/1000) + (家居收藏價值/500)
                let homeVal = 0; if(p.home) p.home.forEach(i => homeVal += i.p);
                const currentLP = Math.floor((p.totalComm || 0) / 1000) + Math.floor(homeVal / 500);
                
                list.innerHTML += `
                    <div class="p-card">
                        <div class="lp-badge">LP: ${currentLP}</div>
                        <b>${id} - ${p.role.n}</b> ${p.idleRounds >= 2 ? '<span class="lazy-tag">快將失業</span>' : ''}<br>
                        💰 現金: $${p.cash} | 📈 總佣金: $${p.totalComm}<br>
                        <small>📦 倉庫: ${p.inv?p.inv.length:0} | 🏠 家居收藏: ${p.home?p.home.length:0}</small>
                    </div>`;
            });

            const log = document.getElementById('log-content');
            log.innerHTML = `<div>[${d.last_action.user}] ${d.last_action.value}</div>` + log.innerHTML;
        });

        window.showSummary = async () => {
            const d = (await get(ref(db, 'game_state'))).val();
            const isQuarterEnd = (d.round % 3 === 0);
            document.getElementById('summary-box').style.display = "block";
            document.getElementById('summary-desc').innerText = isQuarterEnd ? "🏮 季度末：倉庫剩餘貨物將『轉入手持家居』收藏" : "💡 平日結算：貨物保留";

            let h = `<tr><th>玩家</th><th>底薪</th><th>不購買稅</th><th>本輪佣金</th><th>狀態</th><th>小計</th></tr>`;
            Object.keys(d.players).forEach(id => {
                const p = d.players[id];
                // 懲罰機制：連續三輪沒進貨/沒賣貨 (idle)
                let bonus = (p.idleRounds >= 2) ? 0 : 2000;
                let tax = (!p.inv || p.inv.length === 0) ? 1500 : 0; // 不買稅增加到 1500
                if (p.lastEvent === "稅務減免") tax = 0;

                const sub = bonus - tax + (p.currentComm || 0);
                h += `<tr>
                    <td>${id}</td>
                    <td>${bonus === 0 ? '<span style="color:red">$0 (失業)</span>' : '+$2000'}</td>
                    <td style="color:red">-$${tax}</td>
                    <td>+$${p.currentComm || 0}</td>
                    <td>${p.idleRounds >= 2 ? '😴 躺平' : '🔥 積極'}</td>
                    <td><b>$${sub}</b></td>
                </tr>`;
            });
            document.getElementById('summary-table').innerHTML = h;
        };

        window.confirmSettlement = async () => {
            const d = (await get(ref(db, 'game_state'))).val();
            const up = {};
            const isQuarterEnd = (d.round % 3 === 0);
            const isGameEnd = (d.round >= 12);

            Object.keys(d.players).forEach(id => {
                const p = d.players[id];
                
                // 判斷本輪是否有交易 (假設你在 Player 端買賣時會更新一個 lastTradeRound)
                // 這裡簡化為：如果倉庫沒變動且沒賺佣金，視為閒置
                let isIdle = (!p.inv || p.inv.length === 0) && (p.currentComm === 0);
                let newIdleRounds = isIdle ? (p.idleRounds + 1) : 0;
                
                let bonus = (newIdleRounds >= 3) ? 0 : 2000;
                let tax = (!p.inv || p.inv.length === 0) ? 1500 : 0;
                if (p.lastEvent === "稅務減免") tax = 0;

                let newCash = p.cash + bonus - tax;
                
                // 季末：搬貨入屋收藏 (不蝕一半，但貨物變成 LP)
                if (isQuarterEnd && p.inv && p.inv.length > 0) {
                    const currentHome = p.home || [];
                    up[`game_state/players/${id}/home`] = [...currentHome, ...p.inv];
                    up[`game_state/players/${id}/inv`] = [];
                }

                up[`game_state/players/${id}/cash`] = newCash;
                up[`game_state/players/${id}/idleRounds`] = newIdleRounds;
                up[`game_state/players/${id}/currentComm`] = 0; // 重置本輪佣金
                up[`game_state/players/${id}/drawCount`] = 0;
                up[`game_state/players/${id}/lastEvent`] = "無";
            });

            if(isGameEnd) {
                up[`game_state/last_action`] = { user: "SYSTEM", value: "🏆 12 輪挑戰結束！請計算最終 LP 選出大贏家！" };
            } else {
                up[`game_state/round`] = d.round + 1;
                up[`game_state/quarter`] = Math.ceil((d.round + 1) / 3);
                up[`game_state/inventory`] = {}; // 重新開放市場
                up[`game_state/last_action`] = { user: "SYSTEM", value: `第 ${d.round} 輪結算完成。` };
            }

            await update(ref(db), up);
            document.getElementById('summary-box').style.display = 'none';
            if(isGameEnd) alert("遊戲結束！請看龍虎榜 LP 排名！");
        };
    </script>
</body>
</html>
