<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - MC 結算控制台</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #38bdf8; --win: #22c55e; --lose: #ef4444; }
        body { font-family: system-ui; background: var(--bg); color: #f8fafc; margin: 0; display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .sidebar { background: #0f172a; padding: 20px; border-right: 1px solid #334155; }
        .p-card { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
        .main { padding: 30px; overflow-y: auto; }
        #log-screen { background: #000; height: 300px; overflow-y: auto; padding: 15px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; color: #9ece6a; font-family: monospace; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #334155; text-align: center; }
        .btn { cursor: pointer; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; background: var(--accent); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent)">📊 玩家狀態</h2>
        <div id="player-display"></div>
        <button onclick="initGame()" style="background:var(--lose); color:white; width:100%; padding:10px; border-radius:5px">🔄 重置遊戲數據</button>
    </div>
    <div class="main">
        <h2 id="round-info">載入中...</h2>
        <div id="log-screen"><div id="log-content"></div></div>
        
        <div id="summary-area" style="display:none">
            <h3 style="color:var(--win)">🏁 本回合結算清單 (薪金/稅務/損益)</h3>
            <table id="summary-table"></table>
            <button class="btn" style="margin-top:20px; width:100%; height:50px" onclick="processFinalSettlement()">💰 確認結算並發放薪金 (進入下一輪)</button>
        </div>
        
        <button class="btn" style="position:fixed; bottom:20px; right:20px" onclick="showSummary()">📊 準備回合結算</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI", authDomain: "harbour1980-bac14.firebaseapp.com", databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com", projectId: "harbour1980-bac14", appId: "1:1010384901946:web:302f99b7565aa9063aa203" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const EVENTS = [
            {n:"政府派錢", d:"本輪買家預算加 $2000"}, {n:"廣告加持", d:"手機類佣金雙倍"}, {n:"稅務減免", d:"不購買稅歸0"}, 
            {n:"壞貨退回", d:"未賣出貨品退回100%按金"}, {n:"強制購買", d:"推銷後買家必買"}, {n:"奧客降臨", d:"買家可無限壓價"}, 
            {n:"黑市交易", d:"不計張數佣金+$1000"}, {n:"連鎖效應", d:"下一位推銷同買家+$500"}, {n:"物流延誤", d:"入貨成本+$300"}, {n:"名牌效應", d:"金級推銷加30秒"}
        ].sort(()=>Math.random()-0.5);

        window.initGame = () => {
            const roles = [{n:"港產女王", s:"金級產品佣金+$2000"}, {n:"品質大師", s:"免疫扣分"}, {n:"格價大叔", s:"入貨成本-$500"}, {n:"潮流先鋒", s:"永遠當季"}].sort(()=>Math.random()-0.5);
            set(ref(db, 'game_state'), {
                round: 1, quarter: 1, inventory: {}, event_deck: EVENTS,
                players: {
                    P1: { cash: 10000, role: roles[0], totalComm: 0, drawCount: 0, inv: [], lastEvent: "無" },
                    P2: { cash: 10000, role: roles[1], totalComm: 0, drawCount: 0, inv: [], lastEvent: "無" },
                    P3: { cash: 10000, role: roles[2], totalComm: 0, drawCount: 0, inv: [], lastEvent: "無" },
                    P4: { cash: 10000, role: roles[3], totalComm: 0, drawCount: 0, inv: [], lastEvent: "無" }
                },
                last_action: { type: "IDLE", user: "SYS", value: "遊戲初始化成功" }
            });
        };

        onValue(ref(db, 'game_state'), (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('round-info').innerText = `第 ${d.quarter} 季度 - 第 ${d.round} 回合`;
            const list = document.getElementById('player-display'); list.innerHTML = "";
            Object.keys(d.players).forEach(id => {
                const p = d.players[id];
                list.innerHTML += `<div class="p-card"><b>${id} (${p.role.n})</b><br>💰$${p.cash} | 📈$${p.totalComm}<br><small>持貨: ${p.inv? p.inv.length : 0} 件</small></div>`;
            });
            const log = document.getElementById('log-content');
            log.innerHTML = `<div>[${d.last_action.user}] ${d.last_action.value}</div>` + log.innerHTML;
        });

        window.showSummary = async () => {
            const d = (await get(ref(db, 'game_state'))).val();
            document.getElementById('summary-area').style.display = "block";
            let h = `<tr><th>玩家</th><th>底薪</th><th>累積佣金</th><th>不購買稅</th><th>未售按金損失</th><th>預計應得</th></tr>`;
            Object.keys(d.players).forEach(id => {
                const p = d.players[id];
                const tax = (!p.inv || p.inv.length === 0) ? 500 : 0;
                let loss = 0; if(p.inv) p.inv.forEach(i => loss += (i.p * 0.5));
                const total = 2000 + p.totalComm - tax - loss;
                h += `<tr><td>${id}</td><td>+$2000</td><td>+$${p.totalComm}</td><td style="color:red">-$${tax}</td><td style="color:red">-$${loss}</td><td><b>$${total}</b></td></tr>`;
            });
            document.getElementById('summary-table').innerHTML = h;
        };

        window.processFinalSettlement = async () => {
            if(!confirm("確定要進行結算並發放薪金嗎？此動作將清空所有玩家倉庫！")) return;
            const d = (await get(ref(db, 'game_state'))).val();
            const up = {};
            Object.keys(d.players).forEach(id => {
                const p = d.players[id];
                const tax = (!p.inv || p.inv.length === 0) ? 500 : 0;
                let loss = 0; if(p.inv) p.inv.forEach(i => loss += (i.p * 0.5));
                up[`game_state/players/${id}/cash`] = p.cash + 2000 + p.totalComm - tax - loss;
                up[`game_state/players/${id}/totalComm`] = 0; // 重置佣金
                up[`game_state/players/${id}/inv`] = []; // 清空倉庫
                up[`game_state/players/${id}/drawCount`] = 0; // 重置抽卡次數
            });
            up[`game_state/inventory`] = {}; // 清空市場佔用
            let r = d.round + 1; let q = d.quarter; if(r > 3){ r=1; q++; }
            up[`game_state/round`] = r;
            up[`game_state/quarter`] = q;
            up[`game_state/last_action`] = { type:"IDLE", user:"SYS", value:"新回合已開始，薪金已發放，倉庫已清空。" };
            update(ref(db), up);
            document.getElementById('summary-area').style.display = "none";
        };
    </script>
</body>
</html>
