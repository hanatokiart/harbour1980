<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - MC 中央控制台 (終極版)</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #38bdf8; --win: #22c55e; --lose: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
        .sidebar { background: #0f172a; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        .p-card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--accent); }
        .skill-desc { font-size: 0.75rem; color: #94a3b8; margin-top: 5px; font-style: italic; line-height: 1.4; }
        .main { padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        #log-screen { width: 90%; background: #0f172a; border-radius: 12px; padding: 20px; border: 1px solid #334155; height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .log-entry { padding: 10px; border-bottom: 1px solid #1e293b; font-size: 0.95rem; border-left: 3px solid transparent; }
        .log-DRAW { border-left-color: var(--win); color: #9ece6a; }
        .log-OFFER { border-left-color: #e0af68; color: #e0af68; }
        .summary-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
        .summary-table th, .summary-table td { padding: 15px; border: 1px solid #334155; text-align: center; }
        button { cursor: pointer; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; }
        .btn-next { background: var(--accent); color: #020617; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="text-align:center">📊 實時戰報監控</h2>
        <div id="player-display"></div>
        <button onclick="initGame()" style="width:100%; background:var(--lose); color:white; margin-top:10px">🔄 重置遊戲 (含所有數據)</button>
    </div>
    <div class="main">
        <h2 id="round-info" style="color:var(--accent); margin:0">載入中...</h2>
        <div id="log-screen">
            <h4 style="margin:0 0 10px; color:#94a3b8">📡 系統訊息與玩家動作</h4>
            <div id="log-content"></div>
        </div>

        <div id="summary-area" style="display:none; width:90%">
            <h2 style="color:var(--win)">季度銷售結算表</h2>
            <table class="summary-table" id="summary-body"></table>
            <button class="btn-next" onclick="nextRound()">確認並進入下一階段</button>
        </div>

        <button class="btn-next" onclick="showSummary()" style="position:fixed; bottom:30px; right:30px">🏁 結算本季度 / 回合</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI", authDomain: "harbour1980-bac14.firebaseapp.com", databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com", projectId: "harbour1980-bac14", appId: "1:1010384901946:web:302f99b7565aa9063aa203" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const EVENTS = [
            {n:"政府派錢", d:"本輪買家預算加 $2,000。"}, {n:"廣告加持", d:"『手機類』佣金雙倍！"},
            {n:"稅務減免", d:"『不購買稅』(罰款) 降至 $0。"}, {n:"壞貨退回", d:"未賣出的貨，可退回 100% 按金。"},
            {n:"強制購買", d:"買家聽完推銷，除非現金不足，否則必須成交。"}, {n:"奧客降臨", d:"買家可無視底價瘋狂壓價，賣家不可拒絕。"},
            {n:"黑市交易", d:"本輪成交不計入銷售張數，但佣金加 $1,000。"}, {n:"連鎖效應", d:"下一位向同一買家推銷，佣金 +$500。"},
            {n:"物流延誤", d:"本輪所有入貨成本增加 $300。"}, {n:"名牌效應", d:"金級產品推銷時間增加 30 秒。"}
        ].sort(()=>Math.random()-0.5);

        window.initGame = () => {
            const roles = [
                {n:"港產女王", s:"賣出『金級』產品時，佣金外加 +$2,000。"},
                {n:"品質大師", s:"免疫任何『神秘顧客』投票導致的扣分。"},
                {n:"格價大叔", s:"每次入貨（支付按金）時，總成本自動 -$500。"},
                {n:"潮流先鋒", s:"手上貨品永遠視為當季，無視換季罰分。"}
            ].sort(()=>Math.random()-0.5);
            
            set(ref(db, 'game_state'), {
                round: 1, quarter: 1, inventory: {}, event_deck: EVENTS,
                players: {
                    P1: { active: true, cash: 10000, role: roles[0], totalComm: 0, drawCount: 0, inv: [] },
                    P2: { active: true, cash: 10000, role: roles[1], totalComm: 0, drawCount: 0, inv: [] },
                    P3: { active: true, cash: 10000, role: roles[2], totalComm: 0, drawCount: 0, inv: [] },
                    P4: { active: true, cash: 10000, role: roles[3], totalComm: 0, drawCount: 0, inv: [] }
                },
                last_action: { type: "IDLE", user: "SYS", value: "遊戲已初始化" }
            });
        };

        onValue(ref(db, 'game_state'), (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('round-info').innerText = `第 ${d.quarter} 季度 - 第 ${d.round} 回合`;
            const list = document.getElementById('player-display'); list.innerHTML = "";
            Object.keys(d.players).forEach(id => {
                const p = d.players[id];
                list.innerHTML += `<div class="p-card">
                    <h4>${id} - ${p.role.n}</h4>
                    <div class="skill-desc">${p.role.s}</div>
                    <div style="font-size:0.9rem; margin-top:8px">💰 $${p.cash} | 📈 $${p.totalComm}</div>
                </div>`;
            });
            const logContent = document.getElementById('log-content');
            const entry = `<div class="log-entry log-${d.last_action.type}">
                <b>[${d.last_action.user}]</b> ${d.last_action.value} <br>
                <small>${d.last_action.detail || ''}</small>
            </div>`;
            logContent.innerHTML = entry + logContent.innerHTML;
        });

        window.showSummary = async () => {
            const d = (await get(ref(db, 'game_state'))).val();
            document.getElementById('summary-area').style.display = "block";
            let html = `<tr><th>玩家</th><th>身份</th><th>現金</th><th>本季佣金</th></tr>`;
            Object.keys(d.players).forEach(id => {
                if(d.players[id].active) html += `<tr><td>${id}</td><td>${d.players[id].role.n}</td><td>$${d.players[id].cash}</td><td>$${d.players[id].totalComm}</td></tr>`;
            });
            document.getElementById('summary-body').innerHTML = html;
        };

        window.nextRound = async () => {
            const d = (await get(ref(db, 'game_state'))).val();
            let nR = d.round + 1; let nQ = d.quarter;
            if(nR > 3) { nR = 1; nQ++; }
            update(ref(db, 'game_state'), { round: nR, quarter: nQ, last_action: {type:"IDLE", user:"SYS", value:"進入新階段"} });
            document.getElementById('summary-area').style.display = "none";
        };
    </script>
</body>
</html>
