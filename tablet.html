<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>港灣 1980 - MC 交易監控</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --danger: #ef4444; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .container { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        .sidebar { background: #020617; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
        .player-card { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .player-card h4 { margin: 0 0 5px 0; color: var(--accent); }
        .main-stage { padding: 30px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #notification { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
                        display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn-deal { background: #22c55e; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.5rem; cursor: pointer; margin-top: 20px; }
        .btn-fail { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2 style="text-align: center;">📊 季度得分</h2>
            <div id="player-list"></div>
        </div>
        <div class="main-stage">
            <div id="q-display" style="font-size: 1.2rem; color: var(--accent); margin-bottom: 20px;"></div>
            <h1 style="opacity: 0.1; font-size: 4rem;">交易系統待命</h1>
            <button style="position: absolute; bottom: 20px; right: 20px; opacity: 0.3;" onclick="initGame()">重置遊戲</button>
        </div>
    </div>

    <div id="notification">
        <h2 id="note-user"></h2>
        <h1 id="note-text" style="font-size: 3rem; color: var(--accent);"></h1>
        <div id="timer" style="font-size: 5rem; font-weight: bold; margin: 10px 0;"></div>
        <div id="deal-controls">
            <button class="btn-deal" onclick="processDeal(true)">✅ 確認成交</button>
            <button class="btn-fail" onclick="processDeal(false)">❌ 交易失敗/超時</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP91f7RSqqawxB6alEuje8eCpchX3gPWI",
            authDomain: "harbour1980-bac14.firebaseapp.com",
            databaseURL: "https://harbour1980-bac14-default-rtdb.firebaseio.com",
            projectId: "harbour1980-bac14",
            appId: "1:1010384901946:web:302f99b7565aa9063aa203"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'game_state'), (snapshot) => {
            const data = snapshot.val(); if (!data) return;
            document.getElementById('q-display').innerText = `第 ${data.quarter} 季度 - 第 ${data.round} 回合`;
            const listEl = document.getElementById('player-list');
            listEl.innerHTML = "";
            Object.keys(data.players).forEach(id => {
                const p = data.players[id];
                listEl.innerHTML += `<div class="player-card">
                    <h4>${id} - ${p.role}</h4>
                    <div>💰 現金: $${p.cash} | 📈 佣金: $${p.totalComm}</div>
                </div>`;
            });
            if (data.last_action.type !== "IDLE" && data.last_action.user !== "SYS") showNotice(data.last_action);
        });

        function showNotice(act) {
            const el = document.getElementById('notification');
            document.getElementById('note-user').innerText = `玩家 ${act.user}`;
            document.getElementById('note-text').innerText = act.value;
            el.style.display = "flex";
        }

        window.processDeal = async function(success) {
            const snap = await get(ref(db, 'game_state'));
            const data = snap.val();
            const lastAct = data.last_action;
            
            if (success && lastAct.type === "OFFER") {
                // 成交邏輯：買家扣錢，賣家加佣金
                const buyerId = lastAct.user;
                const sellerId = lastAct.seller;
                const price = parseInt(lastAct.price);
                const comm = parseInt(lastAct.comm);

                const updates = {};
                updates[`game_state/players/${buyerId}/cash`] = data.players[buyerId].cash - price;
                updates[`game_state/players/${sellerId}/totalComm`] = data.players[sellerId].totalComm + comm;
                updates[`game_state/last_action`] = { type: "IDLE", user: "SYS", value: "成交成功！" };
                update(ref(db), updates);
            }
            document.getElementById('notification').style.display = "none";
            update(ref(db, 'game_state/last_action'), { type: "IDLE", user: "SYS" });
        };
        
        window.initGame = () => { /* 同上個版本 */ };
    </script>
</body>
</html>
